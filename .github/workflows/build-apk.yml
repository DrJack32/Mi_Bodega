name: Build Android APK

# Compila un APK instalable de Mi Bodega en cada push (p. ej. al usar "Save to GitHub").
# El APK queda disponible como artifact descargable en la pestaña "Actions".

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      # Dominio del backend para el OCR (se inyecta en el bundle JS en tiempo de build).
      # Cámbialo por tu backend desplegado si lo mueves a producción.
      EXPO_PUBLIC_DOMAIN: 313fe69c-0ee6-4106-9924-e70da315f732.preview.emergentagent.com
      NODE_OPTIONS: --max_old_space_size=6144
      GRADLE_OPTS: -Dorg.gradle.workers.max=2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components (NDK, CMake, platform)
        run: |
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0" "ndk;27.1.12297006" "cmake;3.22.1"

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Expo prebuild (Android)
        working-directory: artifacts/mi-bodega
        run: pnpm exec expo prebuild --platform android --no-install --clean

      - name: Embed app code into debug APK
        working-directory: artifacts/mi-bodega
        run: |
          mkdir -p android/app/src/main/assets android/app/src/main/res
          pnpm exec expo export:embed \
            --platform android \
            --dev false \
            --entry-file artifacts/mi-bodega/node_modules/expo-router/entry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --reset-cache

      - name: Check Android JS bundle
        working-directory: artifacts/mi-bodega
        run: pnpm exec expo export --platform android --output-dir /tmp/mi-bodega-android-export --clear

      - name: Increase Gradle memory
        working-directory: artifacts/mi-bodega/android
        run: |
          echo "" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx5120m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8" >> gradle.properties
          echo "org.gradle.workers.max=2" >> gradle.properties

      - name: Build Debug APK
        working-directory: artifacts/mi-bodega/android
        run: ./gradlew assembleDebug -PreactNativeArchitectures=arm64-v8a,armeabi-v7a --no-daemon --stacktrace --warning-mode all

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mi-bodega-android-apk
          path: artifacts/mi-bodega/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
