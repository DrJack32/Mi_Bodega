name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: EAS Build (Android APK)
    runs-on: ubuntu-latest
    env:
      EAS_NO_VCS: 1
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Configure EAS project
        working-directory: artifacts/mi-bodega
        env:
          EAS_PROJECT_ID: ${{ secrets.EAS_PROJECT_ID }}
        run: |
          if [ -n "$EAS_PROJECT_ID" ]; then
            eas init --id "$EAS_PROJECT_ID" --non-interactive
          else
            eas init --non-interactive --force
          fi

      - name: Build APK with EAS
        working-directory: artifacts/mi-bodega
        run: eas build --platform android --profile preview --non-interactive --wait

      - name: Download APK and upload to GitHub
        working-directory: artifacts/mi-bodega
        run: |
          APK_URL=$(eas build:list --platform android --limit 1 --status finished --json | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['artifacts']['buildUrl'])")
          curl -L "$APK_URL" -o mi-bodega.apk
          echo "APK descargado correctamente"

      - name: Upload APK as GitHub artifact
        uses: actions/upload-artifact@v4
        with:
          name: mi-bodega-android-apk
          path: artifacts/mi-bodega/mi-bodega.apk
          retention-days: 30
