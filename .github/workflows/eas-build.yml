name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: EAS Build (Android APK)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Build APK with EAS
        working-directory: artifacts/mi-bodega
        run: eas build --platform android --profile preview --non-interactive --output ./mi-bodega.apk
      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mi-bodega-android
          path: artifacts/mi-bodega/mi-bodega.apk
          retention-days: 30
